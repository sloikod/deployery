name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        if: |
          (
            github.event_name == 'pull_request_target' &&
            (
              github.event.action == 'opened' ||
              github.event.action == 'synchronize' ||
              (github.event.action == 'closed' && github.event.pull_request.merged == true)
            )
          ) ||
          (
            github.event_name == 'issue_comment' &&
            (
              github.event.comment.body == 'recheck' ||
              github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
            )
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: https://github.com/sloikod/deployery/blob/stable/CLA.md
          path-to-signatures: signatures/cla.json
          branch: cla-signatures
          allowlist: github-actions[bot],dependabot[bot]
          custom-notsigned-prcomment: |
            Thanks for the contribution.

            Before this pull request can be merged, please read and sign the CLA:
            https://github.com/sloikod/deployery/blob/stable/CLA.md

            To sign, add the following as a comment on this pull request:
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
