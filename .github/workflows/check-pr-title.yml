name: PR Title

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qE '^(fix|feat|refactor|chore|wip): .+'; then
            echo "PR title must match: <type>: <description>"
            echo "Valid types: fix, feat, refactor, chore, wip"
            echo "Got: $TITLE"
            exit 1
          fi

  check-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check commit message format
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          INVALID=0
          while IFS= read -r msg; do
            if ! echo "$msg" | grep -qE '^(fix|feat|refactor|chore|wip): .+'; then
              echo "Invalid commit message: $msg"
              INVALID=1
            fi
          done < <(git log "$BASE_SHA..$HEAD_SHA" --format='%s')

          if [ "$INVALID" -eq 1 ]; then
            echo ""
            echo "Valid types: fix, feat, refactor, chore, wip"
            echo "Format: <type>: <description>"
            exit 1
          fi
