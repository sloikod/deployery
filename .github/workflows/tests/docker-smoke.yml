name: Docker Smoke

on:
  pull_request:
    paths:
      - 'packages/docker/**'
      - '.github/workflows/tests/docker-smoke.yml'
  push:
    branches:
      # Workflow YAML cannot consume the shared JS config package.
      - stable
      # Keep these aligned with @deployery/constants.
      - beta
    paths:
      - 'packages/docker/**'
      - '.github/workflows/tests/docker-smoke.yml'
  workflow_call:
    inputs:
      no_cache:
        description: Build the image without cache
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

jobs:
  smoke:
    name: Smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep runner/platform pairs aligned with .github/scripts/docker/build-context.mjs.
          - platform: amd64
            docker_platform: linux/amd64
            runner: ubuntu-24.04
          - platform: arm64
            docker_platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      CONTAINER_NAME: deployery-check-${{ matrix.platform }}
      HOST_PORT: 18080
      IMAGE_TAG: deployery-ci:check-${{ matrix.platform }}
      DOCKER_VOLUME_PATH: /data
      VOLUME_NAME: deployery-check-${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Read app version
        id: app-version
        run: echo "value=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./packages/docker/Dockerfile
          platforms: ${{ matrix.docker_platform }}
          load: true
          no-cache: ${{ inputs.no_cache || false }}
          provenance: false
          push: false
          tags: ${{ env.IMAGE_TAG }}
          build-args: |
            DEPLOYERY_VERSION=${{ steps.app-version.outputs.value }}
            DEPLOYERY_DOCKER_VOLUME_PATH=${{ env.DOCKER_VOLUME_PATH }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_SOURCE=${{ github.server_url }}/${{ github.repository }}

      - name: Start container
        # The smoke test keeps its own disposable image/container names and host
        # port so CI can probe a predictable target without touching publish
        # defaults from the shared config package.
        run: docker run -d --name "$CONTAINER_NAME" -p "$HOST_PORT:8080" -v "$VOLUME_NAME:$DOCKER_VOLUME_PATH" "$IMAGE_TAG"

      - name: Verify runtime starts and writes instance file
        env:
          EXPECTED_VERSION: ${{ steps.app-version.outputs.value }}
        run: |
          for i in $(seq 15); do
            if docker exec "$CONTAINER_NAME" test -f "$DOCKER_VOLUME_PATH/instance.json" 2>/dev/null; then
              break
            fi
            [ "$i" -eq 15 ] && { echo "Timed out waiting for instance.json"; exit 1; }
            sleep 1
          done
          docker exec "$CONTAINER_NAME" cat "$DOCKER_VOLUME_PATH/instance.json" > instance.json
          node -e '
            const data = JSON.parse(require("fs").readFileSync("instance.json", "utf8"));
            const expected = process.env.EXPECTED_VERSION;
            if (data.deployeryVersion !== expected) {
              throw new Error("Expected " + expected + ", got " + data.deployeryVersion);
            }
            console.log("Version check passed:", data.deployeryVersion);
          '

      - name: Verify proxy responds
        run: |
          for i in $(seq 15); do
            if curl -fsS "http://127.0.0.1:${HOST_PORT}/" >/dev/null; then
              exit 0
            fi
            [ "$i" -eq 15 ] && { echo "Timed out waiting for proxy response"; exit 1; }
            sleep 1
          done

      - name: Verify filesystem persistence across restart
        run: |
          docker exec "$CONTAINER_NAME" sh -lc '
            mkdir -p /custom-persist
            printf "hello\n" > /custom-persist/value.txt
            printf "world\n" > /etc/deployery-persist-test
          '
          for i in $(seq 15); do
            if docker exec "$CONTAINER_NAME" test -f "$DOCKER_VOLUME_PATH/files/custom-persist/value.txt" 2>/dev/null; then
              break
            fi
            [ "$i" -eq 15 ] && { echo "Timed out waiting for live mirror sync"; exit 1; }
            sleep 1
          done
          docker rm -f "$CONTAINER_NAME"
          docker run -d --name "$CONTAINER_NAME" -p "$HOST_PORT:8080" -v "$VOLUME_NAME:$DOCKER_VOLUME_PATH" "$IMAGE_TAG"
          for i in $(seq 15); do
            if docker exec "$CONTAINER_NAME" sh -lc 'test -f /custom-persist/value.txt && test -f /etc/deployery-persist-test' 2>/dev/null; then
              exit 0
            fi
            [ "$i" -eq 15 ] && { echo "Timed out waiting for restored filesystem state"; exit 1; }
            sleep 1
          done

      - name: Run Trivy scan
        # Keep code scanning results single-arch so the smoke matrix doesn't
        # produce duplicate SARIF uploads for the same workflow run.

        if: matrix.platform == 'amd64'
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.28.0
        with:
          # Scan the temporary smoke-test tag built above, not the publish tag.
          image-ref: ${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results
        if: always() && matrix.platform == 'amd64' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: trivy-results.sarif

      - name: Cleanup
        if: always()
        run: |
          docker rm -f "$CONTAINER_NAME" || true
          docker volume rm "$VOLUME_NAME" || true
