name: Bug Report
description: Report a bug or unexpected behavior in Deployery
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to...
        2. Do...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages, logs, or screenshots if relevant.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Deployery is affected?
      options:
        - Core runtime
        - Extensions
        - UI/UX
        - Docker / deployment
        - Authentication / permissions
        - Workflows / API
        - Integrations
        - Developer experience
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of Deployery are you running?
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Architecture, Node.js version, Docker version, browser (if applicable).
      placeholder: |
        OS: Ubuntu 22.04
        Node: 20.x
        Docker: 24.x
        Browser: Chrome 123
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might be relevant (workflow, related issues, etc.).
    validations:
      required: false
