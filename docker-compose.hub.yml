name: deployery

services:
  caddy:
    image: ghcr.io/OWNER/deployery-caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set to your real domain for automatic HTTPS (e.g. deploy.example.com).
      # Leave unset for plain HTTP on port 80 (local / IP-only access).
      DEPLOYERY_DOMAIN: ${DEPLOYERY_DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
    depends_on:
      - sandbox

  sandbox:
    image: ghcr.io/OWNER/deployery:latest
    # runtime: runsc  # Uncomment to enable gVisor on VPS hosts.
    #                  # Install: https://gvisor.dev/docs/user_guide/install/
    #                  # Requires --host-uds=all in /etc/docker/daemon.json runsc opts
    #                  # for XWayland /tmp/.X11-unix socket access.
    cap_add:
      - SYS_ADMIN
    ports:
      # Bound to 127.0.0.1 — only reachable from this machine, not the internet.
      # Caddy proxies external traffic through ports 80/443 above.
      - "127.0.0.1:3131:3131"
    environment:
      DEPLOYERY_BASE_URL: http://localhost:3131
      DEPLOYERY_SQLITE_PATH: /var/lib/deployery/data/deployery.sqlite
      DEPLOYERY_SANDBOX_ROOTFS: /var/lib/deployery/sandbox-rootfs
      DEPLOYERY_CODE_SERVER_PORT: "13337"
    volumes:
      - sandbox-data:/var/lib/deployery

volumes:
  caddy_data:
  sandbox-data:
