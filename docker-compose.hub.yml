name: deployery

services:
  caddy:
    image: ${DEPLOYERY_CADDY_IMAGE:-ghcr.io/OWNER/deployery-caddy:latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set to your real domain for automatic HTTPS (e.g. deploy.example.com).
      # Use http://localhost for local plain HTTP, or an http:// IP if needed.
      DEPLOYERY_DOMAIN: ${DEPLOYERY_DOMAIN:-http://localhost}
    volumes:
      - caddy_data:/data
    depends_on:
      - sandbox

  sandbox:
    image: ${DEPLOYERY_IMAGE:-ghcr.io/OWNER/deployery:latest}
    hostname: deployery
    runtime: ${DEPLOYERY_SANDBOX_RUNTIME:-runc}
    shm_size: ${DEPLOYERY_SANDBOX_SHM_SIZE:-1gb}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - KILL
      - SETGID
      - SETUID
      - SETPCAP
      - NET_BIND_SERVICE
      - NET_RAW
      - SYS_CHROOT
      - MKNOD
      - AUDIT_WRITE
      - SETFCAP
    security_opt:
      - seccomp=${DEPLOYERY_SANDBOX_SECCOMP_PROFILE:-./docker/seccomp-deployery.json}
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=${DEPLOYERY_SANDBOX_TMP_SIZE:-8g}
      - /run:rw,nosuid,nodev,size=${DEPLOYERY_SANDBOX_RUN_SIZE:-128m}
    ports:
      # Bound to 127.0.0.1 - only reachable from this machine, not the internet.
      # Caddy proxies external traffic through ports 80/443 above.
      - "127.0.0.1:${DEPLOYERY_HOST_PORT:-3131}:3131"
    environment:
      DEPLOYERY_BASE_URL: http://localhost:${DEPLOYERY_HOST_PORT:-3131}
      DB_TYPE: ${DB_TYPE:-sqlite}
      DB_SQLITE_PATH: ${DB_SQLITE_PATH:-/var/lib/deployery/data/deployery.sqlite}
      DB_POSTGRESDB_CONNECTION_URL: ${DB_POSTGRESDB_CONNECTION_URL:-}
      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST:-}
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT:-}
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE:-}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER:-}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD:-}
      DB_POSTGRESDB_SSL_ENABLED: ${DB_POSTGRESDB_SSL_ENABLED:-false}
      DEPLOYERY_SANDBOX_ROOTFS: /
      DEPLOYERY_SANDBOX_HOME: /home/user
      DEPLOYERY_CODE_SERVER_PORT: "13337"
      DEPLOYERY_SANDBOX_ISOLATION_MODE: ${DEPLOYERY_SANDBOX_ISOLATION_MODE:-compatibility}
      DEPLOYERY_SANDBOX_RUNTIME: ${DEPLOYERY_SANDBOX_RUNTIME:-runc}
      DEPLOYERY_SANDBOX_GPU_COUNT: ${DEPLOYERY_SANDBOX_GPU_COUNT:-0}
      DEPLOYERY_SANDBOX_NVIDIA_VISIBLE_DEVICES: ${DEPLOYERY_SANDBOX_NVIDIA_VISIBLE_DEVICES:-all}
      DEPLOYERY_SANDBOX_NVIDIA_DRIVER_CAPABILITIES: ${DEPLOYERY_SANDBOX_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      NVIDIA_VISIBLE_DEVICES: ${DEPLOYERY_SANDBOX_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${DEPLOYERY_SANDBOX_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - sandbox-usr:/usr
      - sandbox-etc:/etc
      - sandbox-var:/var
      - sandbox-opt:/opt
      - sandbox-home:/home/user
      - sandbox-data:/var/lib/deployery

volumes:
  caddy_data:
  sandbox-usr:
  sandbox-etc:
  sandbox-var:
  sandbox-opt:
  sandbox-home:
  sandbox-data:
