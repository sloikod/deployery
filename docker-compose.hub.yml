name: deployery

services:
  caddy:
    image: ${DEPLOYERY_CADDY_IMAGE:-ghcr.io/OWNER/deployery-caddy:latest}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set to your real domain for automatic HTTPS (e.g. deploy.example.com).
      # Leave unset for plain HTTP on port 80 (local / IP-only access).
      DEPLOYERY_DOMAIN: ${DEPLOYERY_DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
    depends_on:
      - sandbox

  sandbox:
    image: ${DEPLOYERY_IMAGE:-ghcr.io/OWNER/deployery:latest}
    hostname: deployery
    runtime: ${DEPLOYERY_SANDBOX_RUNTIME:-runc}
    shm_size: ${DEPLOYERY_SANDBOX_SHM_SIZE:-1gb}
    security_opt:
      - seccomp=${DEPLOYERY_SANDBOX_SECCOMP_PROFILE:-unconfined}
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,size=${DEPLOYERY_SANDBOX_TMP_SIZE:-1g}
      - /run:rw,nosuid,nodev,size=${DEPLOYERY_SANDBOX_RUN_SIZE:-128m}
    ports:
      # Bound to 127.0.0.1 - only reachable from this machine, not the internet.
      # Caddy proxies external traffic through ports 80/443 above.
      - "127.0.0.1:3131:3131"
    environment:
      DEPLOYERY_BASE_URL: http://localhost:3131
      DB_TYPE: ${DB_TYPE:-sqlite}
      DB_SQLITE_PATH: ${DB_SQLITE_PATH:-/var/lib/deployery/data/deployery.sqlite}
      DB_POSTGRESDB_CONNECTION_URL: ${DB_POSTGRESDB_CONNECTION_URL:-}
      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST:-}
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT:-}
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE:-}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER:-}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD:-}
      DB_POSTGRESDB_SSL_ENABLED: ${DB_POSTGRESDB_SSL_ENABLED:-false}
      DEPLOYERY_SANDBOX_ROOTFS: /
      DEPLOYERY_SANDBOX_HOME: /home/user
      DEPLOYERY_CODE_SERVER_PORT: "13337"
      DEPLOYERY_SANDBOX_ISOLATION_MODE: ${DEPLOYERY_SANDBOX_ISOLATION_MODE:-compatibility}
      DEPLOYERY_SANDBOX_RUNTIME: ${DEPLOYERY_SANDBOX_RUNTIME:-runc}
    volumes:
      - sandbox-usr:/usr
      - sandbox-etc:/etc
      - sandbox-var:/var
      - sandbox-opt:/opt
      - sandbox-home:/home/user
      - sandbox-data:/var/lib/deployery

volumes:
  caddy_data:
  sandbox-usr:
  sandbox-etc:
  sandbox-var:
  sandbox-opt:
  sandbox-home:
  sandbox-data:
